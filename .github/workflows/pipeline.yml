name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install node 20
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      commit_id_output: ${{ steps.set_variable.outputs.commit_id }}
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Set commit_id for variable tagging
        id: set_variable
        run: | 
          echo "commit_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: kevinariasdev/dev-cicd-challenge:${{ steps.set_variable.outputs.commit_id }}
  
  deployStaging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Create config file for deployment in Staging
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG_K3S_STAGING}" > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KUBE_CONFIG_K3S_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
      
      - name: Replace image tag and deploy to Staging
        run: |
          sed -i "s/IMAGE_TAG/${{ needs.build.outputs.commit_id_output }}/g" k8s-manifests/deployment.yml
          kubectl apply -f k8s-manifests/

      - name: Smoke test in Staging
        run: curl -X GET -f 54.163.73.69:30000/health || exit 1

  deployProduction:
    runs-on: ubuntu-latest
    needs: deployStaging
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Create config file for deployment in Production
        run: |
          echo "${KUBE_CONFIG_K3S}" > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KUBE_CONFIG_K3S: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Production
        run: kubectl apply -f k8s-manifests/
      
      - name: Smoke test in Production
        id: prod_smoke_test
        run: curl -X GET -f 54.163.73.69:30000/health || exit 1
        
      - name: Rollback if failed
        if: steps.prod_smoke_test.outcome == 'failure'
        run: kubectl rollout undo deployment/dev-cicd-challenge-deployment