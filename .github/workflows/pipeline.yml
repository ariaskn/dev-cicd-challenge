name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install node 20
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Install dependencies and run tests
        run: |
          chmod +x scripts/logs.sh
          source scripts/logs.sh
          run_step "Install dependencies" "npm install" || exit 1
          run_step "Run tests" "npm test" || exit 1
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.job }}
          path: logs/pipeline_output.log

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      commit_id_output: ${{ steps.set_variable.outputs.commit_id }}
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Set commit_id for variable tagging
        id: set_variable
        run: | 
          echo "commit_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        id: docker_login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Login - Log result
        if: always()
        run: |
          echo "STEP: Login to Docker Hub" >> logs/pipeline_output.log
          echo "STATUS: ${{ steps.docker_login.outcome }}" >> logs/pipeline_output.log

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: kevinariasdev/dev-cicd-challenge:${{ steps.set_variable.outputs.commit_id }}
       
      - name: Build and Push - Log result
        if: always()
        run: |
          echo "STEP: Build and Push Docker Image" >> logs/pipeline_output.log
          echo "STATUS: ${{ steps.build_push.outcome }}" >> logs/pipeline_output.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.job }}
          path: logs/pipeline_output.log

  deployStaging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Create config file for deployment in Staging
        env:
          KUBE_CONFIG_K3S_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG_K3S_STAGING}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Replace image tag and deploy to Staging
        run: |
          chmod +x scripts/logs.sh
          source scripts/logs.sh
          run_step "Replace image tag and deploy to Staging" "sed -i "s/IMAGE_TAG/${{ needs.build.outputs.commit_id_output }}/g" k8s-manifests/deployment.yml" || exit 1
          run_step "Replace image tag and deploy to Staging" "kubectl apply -f k8s-manifests/" || exit 1

      - name: Smoke test in Staging
        env:
          STAGING_SERVER: ${{ secrets.STAGING_EC2_SERVER }}
        run: |
          run_step "Smoke test in Staging" "curl -X GET -f ${STAGING_SERVER}:30000/health" || exit 1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.job }}
          path: logs/pipeline_output.log

  deployProduction:
    runs-on: ubuntu-latest
    needs: deployStaging
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Create config file for deployment in Production
        env:
          KUBE_CONFIG_K3S: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "${KUBE_CONFIG_K3S}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Production
        run: |
          chmod +x scripts/logs.sh
          source scripts/logs.sh
          run_step "Deploy to Production" "kubectl apply -f k8s-manifests/" || exit 1
        
      - name: Smoke test in Production
        id: prod_smoke_test
        env:
          PRODUCTION_SERVER: ${{ secrets.PRODUCTION_SERVER }}
        run: | 
          run_step "Smoke test in Production" "curl -X GET -f ${PRODUCTION_SERVER}:30000/health" || exit 1
        
      - name: Rollback if failed
        if: steps.prod_smoke_test.outcome == 'failure'
        run: kubectl rollout undo deployment/dev-cicd-challenge-deployment
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.job }}
          path: logs/pipeline_output.log

  logFailure:
    runs-on: ubuntu-latest
    needs:
      - test
      - build
      - deployStaging
      - deployProduction
    if: always() && failure()
    steps:
      - name: Clone Git
        uses: actions/checkout@v6.0.2

      - name: Install node 20
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_logs
          pattern: logs-*

      - name: Merge logs
        run: |
          find downloaded_logs -name "*.log" -exec cat {} \; > artifacts/full_logs.log

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident-report.log
          path: artifacts/full_logs.log

      - name: Prepare failed logs
        run: |
          head -n 500 artifacts/full_logs.log > artifacts/failed_jobs.log
          echo "" >> artifacts/failed_jobs.log
          echo "=== ERRORS ===" >> artifacts/failed_jobs.log
          grep -i "error\|fail\|exception" artifacts/full_logs.log | head -n 100 >> artifacts/failed_jobs.log

      - name: Run AI Resolver
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npm install --resolver scripts/
          npm start --prefix scripts/

      - name: Upload incident report artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident_report.json
          path: artifacts/incident_report.json